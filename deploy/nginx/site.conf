# Keep this aligned with MAX_UPLOAD_REQUEST_SIZE. Cloudflare Free/Pro proxied
# uploads are capped at 100 MB, so the application file limit is 95 MB.
client_max_body_size 100m;
client_body_timeout 600s;
client_body_buffer_size 512k;
proxy_connect_timeout 60s;
proxy_send_timeout 600s;
proxy_read_timeout 600s;
send_timeout 600s;

upstream frontend_upstream {
  server frontend:3000;
}

upstream backend_upstream {
  server backend:8080;
}

upstream minio_upstream {
  server minio:9000;
}

server {
  listen 80;
  listen 443 ssl;
  server_name lingnaive520.uk www.lingnaive520.uk media.lingnaive520.uk _;

  ssl_certificate /etc/nginx/certs/origin.crt;
  ssl_certificate_key /etc/nginx/certs/origin.key;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  location ^~ /rinana-media/ {
    # Serves presigned MinIO GET URLs and accepts presigned browser PUT uploads.
    # Keep request buffering off so Nginx does not spool large video uploads.
    proxy_pass http://minio_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_force_ranges on;
    add_header Accept-Ranges bytes always;
    add_header Cache-Control "public, max-age=900, s-maxage=900" always;
  }

  location ^~ /api/media/ {
    client_max_body_size 100m;
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_max_temp_file_size 0;
    add_header Cache-Control "no-store" always;
  }

  location /api/ {
    proxy_pass http://backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "no-store" always;
  }

  location /_next/static/ {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
